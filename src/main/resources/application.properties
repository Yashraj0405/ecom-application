spring.application.name=ecom-application

# Enable H2 console for in-memory database access
spring.h2.console.enabled = true
# Configure H2 in-memory database
spring.datasource.url=jdbc:h2:mem:test
#Enable SQL logging for debugging purposes
spring.jpa.show-sql = true
# Automatically update the database schema based on entity changes
spring.jpa.hibernate.ddl-auto = create